<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Papicilo Laundry — Internal Access</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue-dark:  #095480; --blue-mid:   #0F8FD9; --blue-main:  #0F8FD9;
    --blue-light: #ADD3E8; --blue-pale:  #B0D5EA; --white:      #ffffff;
    --gray-50:    #f0f7fb; --gray-100:   #dceef6; --gray-300:   #93b8cd;
    --gray-500:   #4a7a96; --gray-700:   #0c3a52; --green:      #22c55e;
    --yellow:     #f59e0b; --red:        #ef4444; --sidebar-w:  220px;
    --topbar-h:   52px;    --radius:     10px;    --shadow:     0 4px 20px rgba(9,84,128,.13);
    --font-title: 'Poppins', sans-serif; --font-body:  'Poppins', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--gray-50); color: var(--gray-700); min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--blue-pale); border-radius: 99px; }

  /* LOGIN PAGE */
  #page-login { min-height: 100vh; display: flex; flex-direction: column; background: #e8eef2; position: relative; overflow: hidden; }
  #page-login::after { content: ''; position: absolute; bottom: -80px; left: -60px; right: -60px; height: 260px; background: linear-gradient(160deg, var(--blue-dark) 0%, var(--blue-mid) 100%); border-radius: 60% 60% 0 0 / 40% 40% 0 0; z-index: 0; }
  .login-topbar { height: 56px; background: var(--blue-dark); display: flex; align-items: center; padding: 0 36px; z-index: 2; }
  .login-topbar-logobox { background: var(--white); border: 2px solid var(--blue-light); border-radius: 6px; padding: 3px 8px; font-weight: 700; font-size: .72rem; color: var(--blue-dark); text-align: center; }
  .login-topbar-logobox span { display: block; color: #c0392b; font-size: .55rem; }
  .login-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px 120px; z-index: 1; }
  .login-card { display: flex; width: 700px; max-width: 100%; border-radius: 18px; overflow: hidden; box-shadow: 0 12px 48px rgba(9,84,128,.22); }
  .lc-left { width: 240px; background: var(--blue-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; gap: 24px; }
  .lc-logo-circle { width: 130px; height: 130px; border-radius: 50%; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(0,0,0,.25); }
  .lc-wordmark { font-weight: 800; font-size: 1.1rem; color: var(--blue-dark); }
  .lc-sub { font-weight: 600; font-size: .38rem; color: #c0392b; }
  .lc-tagline { color: var(--white); text-align: center; font-weight: 700; font-size: 1.15rem; }
  .lc-right { flex: 1; background: #f5f7fa; padding: 44px 40px; display: flex; flex-direction: column; justify-content: center; }
  .lc-right h3 { font-weight: 700; font-size: 1.6rem; color: var(--blue-mid); margin-bottom: 24px; }
  .lc-field { margin-bottom: 16px; }
  .lc-field label { display: block; font-size: .82rem; margin-bottom: 5px; }
  .lc-field input { width: 100%; padding: 11px 14px; border: none; border-radius: 8px; background: #dde4eb; outline: none; }
  .lc-field input:focus { background: var(--white); box-shadow: 0 0 0 2px var(--blue-mid); }
  .btn-signin { width: 100%; padding: 13px; background: var(--blue-dark); color: var(--white); border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
  #login-error { color: var(--red); font-size: .8rem; margin-bottom: 10px; display: none; text-align: center; }

  /* MAIN LAYOUT */
  #page-main { display: none; flex-direction: column; min-height: 100vh; }
  .topbar { height: var(--topbar-h); background: linear-gradient(90deg, var(--blue-dark) 0%, var(--blue-main) 100%); display: flex; align-items: center; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .topbar-logo { display: flex; align-items: center; gap: 10px; }
  .topbar-logo-circle { width: 34px; height: 34px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .7rem; color: var(--blue-dark); }
  .topbar-brand { color: var(--white); font-weight: 700; font-size: .95rem; }
  .topbar-brand span { display: block; font-size: .7rem; font-weight: 500; opacity: .7; }
  .topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  .btn-logout { background: rgba(255,255,255,.15); color: var(--white); border: 1px solid rgba(255,255,255,.25); border-radius: 6px; padding: 5px 14px; font-size: .82rem; cursor: pointer; }
  .hamburger { width: 32px; height: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; border-radius: 6px; }
  .hamburger span { display: block; width: 18px; height: 2px; background: var(--white); border-radius: 2px; }

  .main-body { display: flex; margin-top: var(--topbar-h); min-height: calc(100vh - var(--topbar-h)); }
  .sidebar { width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--gray-100); display: flex; flex-direction: column; padding: 24px 0; position: fixed; top: var(--topbar-h); right: 0; height: calc(100vh - var(--topbar-h)); transform: translateX(100%); transition: transform .3s; z-index: 90; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-user { padding: 0 20px 20px; border-bottom: 1px solid var(--gray-100); margin-bottom: 12px; }
  .sidebar-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.3rem; color: var(--white); margin-bottom: 10px; }
  .sidebar-username { font-weight: 700; font-size: .95rem; }
  .sidebar-role { font-size: .75rem; color: var(--gray-500); }
  .sidebar-menu { list-style: none; padding: 0 10px; }
  .sidebar-menu li a, .sidebar-menu li button { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; text-decoration: none; color: var(--gray-500); font-size: .88rem; font-weight: 600; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
  .sidebar-menu li a.active { background: var(--blue-pale); color: var(--blue-main); }
  
  .content { flex: 1; padding: 30px; min-width: 0; }
  .page-title { font-size: 1.5rem; font-weight: 700; color: var(--blue-dark); margin-bottom: 24px; }
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: linear-gradient(135deg, var(--blue-mid) 0%, var(--blue-dark) 100%); border-radius: var(--radius); padding: 20px; color: var(--white); box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,.07); bottom: -20px; right: -20px; }
  .stat-label { font-size: .72rem; font-weight: 600; opacity: .8; text-transform: uppercase; }
  .stat-value { font-size: 2.4rem; font-weight: 700; line-height: 1; }

  .table-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .table-card-head { padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-100); }
  .badge-live { background: rgba(34,197,94,.12); color: var(--green); font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; display: flex; align-items: center; gap: 5px; }
  .badge-live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(.7); } }

  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--gray-50); padding: 11px 16px; text-align: left; font-size: .72rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid var(--gray-100); }
  tbody td { padding: 13px 16px; font-size: .86rem; color: var(--gray-700); }
  .td-id { font-weight: 700; color: var(--blue-mid); }
  .status-badge { display: inline-block; padding: 3px 12px; border-radius: 99px; font-size: .72rem; font-weight: 700; }
  .status-selesai  { background: rgba(34,197,94,.12); color: var(--green); }
  .status-proses   { background: rgba(245,158,11,.12); color: var(--yellow); }
  .status-antrian  { background: rgba(15,143,217,.10); color: var(--blue-mid); }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--blue-main); font-size: 1.1rem; }

  /* MODAL DETAIL ORDER */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(9,84,128,.35); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; pointer-events: none; }
  .modal-overlay.open { display: flex; pointer-events: auto; }
  .modal { background: var(--white); border-radius: 16px; padding: 32px; width: 550px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 1.2rem; font-weight: 700; color: var(--blue-dark); }
  .modal-close { background: var(--gray-100); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .customer-card { display: flex; align-items: flex-start; gap: 18px; background: var(--gray-50); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; }
  .customer-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.3rem; color: var(--white); }
  .customer-info h4 { font-weight: 700; font-size: 1rem; margin: 0 0 4px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .info-item label { font-size: .7rem; font-weight: 700; color: var(--gray-300); text-transform: uppercase; display: block; margin-bottom: 3px; }
  .info-item p { font-size: .88rem; font-weight: 600; margin: 0; }
  .btn-save-detail { width: 100%; margin-top: 20px; background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid)); color: var(--white); border: none; border-radius: 8px; padding: 11px; font-weight: 700; cursor: pointer; }
  
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--blue-dark); color: var(--white); padding: 12px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600; opacity: 0; transition: all .3s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(-10px); }
</style>
</head>
<body>

<div id="page-login">
  <div class="login-topbar"><div class="login-topbar-logobox">PAPICILO<span>LAUNDRY KOIN EXPRESS</span></div></div>
  <div class="login-center">
    <div class="login-card">
      <div class="lc-left"><div class="lc-logo-circle"><div class="lc-wordmark">PAPICILO</div></div></div>
      <div class="lc-right">
        <h3>Internal Login</h3>
        <div class="lc-field"><label>Username</label><input type="text" id="inp-user" /></div>
        <div class="lc-field"><label>Password</label><input type="password" id="inp-pass" /></div>
        <div id="login-error">Username atau password salah!</div>
        <button class="btn-signin" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </div>
</div>

<div id="page-main">
  <header class="topbar">
    <div class="topbar-logo"><div class="topbar-logo-circle">P</div><div class="topbar-brand">Papicilo<span>Internal</span></div></div>
    <div class="topbar-right"><button class="btn-logout" onclick="doLogout()">Log out</button></div>
  </header>
  <div class="main-body">
    <div class="content">
      <div class="stat-row">
        <div class="stat-card"><span class="stat-label">Total Order</span><span class="stat-value" id="stat-total">0</span></div>
      </div>
      <div class="table-card">
        <div class="table-card-head"><h4>📋 Daftar Order Hari Ini</h4></div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>ID</th><th>Nama Pelanggan</th><th>Layanan</th><th>Waktu</th><th>Status</th><th style="text-align:center">Detail</th></tr></thead>
            <tbody id="order-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Detail Pelanggan</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="customer-card">
      <div class="customer-avatar" id="m-avatar">NA</div>
      <div class="customer-info"><p style="font-size:.8rem;color:#4a7a96;margin:0;">Pelanggan</p><h4 id="m-name">—</h4></div>
    </div>
    
    <div class="info-grid">
      <div class="info-item"><label>No. Order</label><p id="m-id">—</p></div>
      <div class="info-item"><label>Waktu</label><p id="m-waktu">—</p></div>
      <div class="info-item" style="grid-column: span 2;"><label>Layanan</label><p id="m-layanan">—</p></div>
      <div class="info-item"><label>Nomor HP</label><p id="m-hp">—</p></div>
      
      <div class="info-item">
        <label>Status Order</label>
        <select id="m-status-select" style="width: 100%; padding: 6px; border-radius: 5px; outline: none;">
            <option value="Antrian">Antrian</option>
            <option value="Proses cuci">Proses Cuci</option>
            <option value="Selesai">Selesai</option>
        </select>
      </div>

      <div class="info-item" style="grid-column: span 2;"><label>Alamat</label><p id="m-alamat">—</p></div>
      
      <div class="info-item">
        <label>Bobot (Kg)</label>
        <input type="number" id="m-bobot" step="0.1" placeholder="Misal: 2.5" style="width: 100%; padding: 6px; border-radius: 5px; border: 1px solid var(--blue-mid); outline: none;" oninput="hitungTotal()">
      </div>
      <div class="info-item">
        <label>Total Bayar</label>
        <input type="text" id="m-total" placeholder="Rp 0" readonly style="width: 100%; padding: 6px; border-radius: 5px; background: var(--gray-100); font-weight: bold;">
      </div>
    </div>
    
    <button class="btn-save-detail" id="btn-save-detail" onclick="simpanDetail()">💾 Simpan Detail</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_fyb9g26nXUKqpSr0tXsRzOOUfB7uUPLxw16cGBFmhdAoWdVtsO1LqtigxYOzuQGRrg/exec';
let ORDERS = [];
let idAktif = null;

// FETCH DATA DARI SHEETS
async function fetchOrdersFromSheets() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    ORDERS = data.map((item, index) => {
        let waktuStr = item.waktu;
        try {
            const d = new Date(item.waktu);
            if(!isNaN(d.getTime())) waktuStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        } catch(e) {}
        return { ...item, id: index + 1, waktu: waktuStr };
    }).reverse();
    renderOrders();
  } catch (e) { console.error('Error:', e); }
}

// RENDER TABEL
function renderOrders() {
  const tbody = document.getElementById('order-tbody');
  tbody.innerHTML = '';
  document.getElementById('stat-total').textContent = ORDERS.length;

  if (ORDERS.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Belum ada data</td></tr>';
      return;
  }
  
  ORDERS.forEach(o => {
    let sClass = 'status-antrian';
    if(o.status === 'Selesai') sClass = 'status-selesai';
    if(o.status && o.status.startsWith('Proses')) sClass = 'status-proses';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-id">#${o.id.toString().padStart(4, '0')}</td>
      <td style="font-weight:600;">${o.name}</td>
      <td>${o.layanan}</td>
      <td>${o.waktu}</td>
      <td><span class="status-badge ${sClass}">${o.status}</span></td>
      <td style="text-align:center"><button class="btn-icon" onclick="openModal('${o.id}')">👁️</button></td>
    `;
    tbody.appendChild(tr);
  });
}

// BUKA MODAL
function openModal(id) {
  const o = ORDERS.find(x => x.id == id);
  if (!o) return;
  idAktif = id;

  document.getElementById('m-avatar').textContent = (o.name || 'NN').substring(0,2).toUpperCase();
  document.getElementById('m-name').textContent = o.name;
  document.getElementById('m-id').textContent = '#' + o.id.toString().padStart(4, '0');
  document.getElementById('m-waktu').textContent = o.waktu;
  document.getElementById('m-layanan').textContent = o.layanan;
  document.getElementById('m-hp').textContent = o.hp || '-';
  document.getElementById('m-alamat').textContent = o.alamat || '-';
  
  // Mengisi form berdasarkan data lama di sheets
  document.getElementById('m-status-select').value = o.status || 'Antrian';
  document.getElementById('m-bobot').value = o.bobot || '';
  document.getElementById('m-total').value = o.total || '';

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
    idAktif = null;
  }
}

// HITUNG HARGA OTOMATIS
function hitungTotal() {
    const layanan = document.getElementById('m-layanan').textContent.toLowerCase();
    const bobot = parseFloat(document.getElementById('m-bobot').value) || 0;
    let hargaPerKg = 0;

    if (layanan.includes('express 3 jam')) hargaPerKg = 40000;
    else if (layanan.includes('express 6 jam')) hargaPerKg = 25000;
    else if (layanan.includes('express 9 jam')) hargaPerKg = 20000;
    else if (layanan.includes('reguler 24 jam')) hargaPerKg = 12500;

    if (hargaPerKg > 0 && bobot > 0) {
        document.getElementById('m-total').value = 'Rp ' + (bobot * hargaPerKg).toLocaleString('id-ID');
    } else {
        document.getElementById('m-total').value = '';
    }
}

// SIMPAN KE GOOGLE SHEETS
async function simpanDetail() {
    if (!idAktif) return;
    const btn = document.getElementById('btn-save-detail');
    btn.innerHTML = '⏳ Menyimpan...';
    btn.disabled = true;

    const params = new URLSearchParams();
    params.append('action', 'updateDetail');
    params.append('id', idAktif);
    params.append('status', document.getElementById('m-status-select').value);
    params.append('bobot', document.getElementById('m-bobot').value);
    params.append('total', document.getElementById('m-total').value);

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
        });

        if (response.ok) {
            showToast("✅ Berhasil disimpan!");
            fetchOrdersFromSheets();
            closeModal();
        }
    } catch (err) {
        console.error(err);
        showToast("❌ Gagal menyimpan.");
    } finally {
        btn.innerHTML = '💾 Simpan Detail';
        btn.disabled = false;
    }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// LOGIN SYSTEM
const ACCOUNTS = [{ username: 'admin', password: '123' }, { username: 'nay', password: '123' }];
function doLogin() {
    const u = document.getElementById('inp-user').value.toLowerCase();
    const p = document.getElementById('inp-pass').value;
    if (ACCOUNTS.find(a => a.username === u && a.password === p)) {
        document.getElementById('page-login').style.display = 'none';
        document.getElementById('page-main').style.display = 'flex';
        fetchOrdersFromSheets();
        setInterval(fetchOrdersFromSheets, 10000); // Live update
    } else {
        document.getElementById('login-error').style.display = 'block';
    }
}
function doLogout() { location.reload(); }
</script>
</body>
</html>
